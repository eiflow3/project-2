name: offline_order_manager
description: A premium offline-first order tracking application built in Flutter.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Local database persistence
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  path: ^1.8.3

  # State management
  provider: ^6.1.2

  # Security / hashing
  crypto: ^3.0.3

  # Premium icons
  cupertino_icons: ^1.0.6
  sqflite_common_ffi: ^2.4.0+3
  sqflite_common_ffi_web: ^1.1.1
  archive: ^4.0.9
  file_picker: ^11.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
